# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # Windows is intentionally excluded: the package uses low-level POSIX
          # file I/O (sysconf(_SC_PAGE_SIZE), S_IRGRP/S_IWGRP, posix_fadvise)
          # that mingw does not provide, so it has never built there.
          - {os: macOS-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v2

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          # Fail only on ERRORs, not WARNINGs. This package deliberately reaches
          # into R's C internals (it is a database of arbitrary R values), so
          # "checking compiled code" reports non-API calls (ATTRIB iteration and
          # the gp-bit "cached" flag via LEVELS/SETLEVELS, see src/r_compat.h)
          # for which there is no public-API replacement. Those remain WARNINGs.
          error-on: '"error"'
          upload-snapshots: true
